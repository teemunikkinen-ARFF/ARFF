<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Tausta -->
  <rect width="512" height="512" rx="112" fill="#080c14"/>
  <!-- Reunaviiva -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#ff5500" stroke-width="8" opacity="0.4"/>
  <!-- Sisempi kehys -->
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none" stroke="#ff5500" stroke-width="2" opacity="0.15"/>

  <!-- Lentokone (yläosa) -->
  <g transform="translate(256,200) rotate(-30)" fill="#ff5500">
    <!-- Runko -->
    <ellipse cx="0" cy="0" rx="80" ry="18"/>
    <!-- Nenä -->
    <ellipse cx="85" cy="0" rx="20" ry="12"/>
    <!-- Vasen siipi -->
    <polygon points="-10,-16 60,-16 30,44 -10,24"/>
    <!-- Oikea siipi -->
    <polygon points="-10,16 60,16 30,-44 -10,-24"/>
    <!-- Pyrstöstabiili vaaka -->
    <polygon points="-72,-10 -45,-10 -55,30 -75,20"/>
    <polygon points="-72,10 -45,10 -55,-30 -75,-20"/>
    <!-- Pystystabi -->
    <polygon points="-75,0 -52,0 -62,-40 -78,-28"/>
  </g>

  <!-- Flammaviiva / pelastuskorostus -->
  <line x1="60" y1="340" x2="452" y2="340" stroke="#ff5500" stroke-width="3" opacity="0.3" stroke-dasharray="8 6"/>

  <!-- ARFF teksti -->
  <text x="256" y="398"
    font-family="'Arial Black',sans-serif"
    font-size="72" font-weight="900"
    text-anchor="middle"
    letter-spacing="8"
    fill="#ff5500">ARFF</text>

  <!-- EFHK teksti -->
  <text x="256" y="448"
    font-family="'Courier New',monospace"
    font-size="32" font-weight="700"
    text-anchor="middle"
    letter-spacing="6"
    fill="#00aadd" opacity="0.9">EFHK</text>

  <!-- Pienet pisteet kulmissa -->
  <circle cx="50" cy="50" r="4" fill="#ff5500" opacity="0.3"/>
  <circle cx="462" cy="50" r="4" fill="#ff5500" opacity="0.3"/>
  <circle cx="50" cy="462" r="4" fill="#ff5500" opacity="0.3"/>
  <circle cx="462" cy="462" r="4" fill="#ff5500" opacity="0.3"/>
</svg>